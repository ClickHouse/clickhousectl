name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --tag v0.2.5

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Verify static linking
        if: contains(matrix.target, 'linux-musl')
        run: |
          binary="target/${{ matrix.target }}/release/clickhousectl"
          echo "--- file output ---"
          file "$binary"
          file "$binary" | grep -q "statically linked"
          echo "--- ldd output ---"
          ! ldd "$binary" 2>&1 || ldd "$binary" 2>&1 | grep -q "not a dynamic executable"
          echo "Static linking verified."

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/clickhousectl clickhousectl-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clickhousectl-${{ matrix.target }}
          path: clickhousectl-${{ matrix.target }}

  smoke-test:
    name: Smoke test (${{ matrix.distro }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu:20.04
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: ubuntu:22.04
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: ubuntu:24.04
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: debian:bullseye
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: debian:bookworm
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: centos:7
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: amazonlinux:2
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: alpine:3.18
            artifact: clickhousectl-x86_64-unknown-linux-musl
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}

      - name: Run smoke test in ${{ matrix.distro }}
        run: |
          chmod +x ${{ matrix.artifact }}
          docker run --rm \
            -v "$PWD/${{ matrix.artifact }}:/usr/local/bin/clickhousectl:ro" \
            ${{ matrix.distro }} \
            sh -c 'clickhousectl --version && clickhousectl --help'

  release:
    name: Create Release
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir release
          for dir in artifacts/clickhousectl-*/; do
            cp "$dir"/* release/
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe #v2
        with:
          generate_release_notes: true
          files: release/*
