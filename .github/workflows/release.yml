name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify Cargo.toml version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${TAG#v}"
          cargo_version="$(grep -m1 '^version' crates/clickhousectl/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$tag_version  cargo=$cargo_version"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Tag $TAG does not match crates/clickhousectl/Cargo.toml version $cargo_version"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --version 0.2.5

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Verify static linking
        if: contains(matrix.target, 'linux-musl')
        run: |
          binary="target/${{ matrix.target }}/release/clickhousectl"
          echo "--- file output ---"
          file "$binary"
          file "$binary" | grep -qE "statically linked|static-pie linked"
          echo "--- ldd output ---"
          ldd_output=$(ldd "$binary" 2>&1 || true)
          echo "$ldd_output"
          echo "$ldd_output" | grep -qE "not a dynamic executable|statically linked"
          echo "Static linking verified."

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/clickhousectl clickhousectl-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clickhousectl-${{ matrix.target }}
          path: clickhousectl-${{ matrix.target }}

  smoke-test:
    name: Smoke test (${{ matrix.distro }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu:20.04
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: ubuntu:22.04
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: ubuntu:24.04
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: debian:bullseye
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: debian:bookworm
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: centos:7
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: amazonlinux:2
            artifact: clickhousectl-x86_64-unknown-linux-musl
          - distro: alpine:3.18
            artifact: clickhousectl-x86_64-unknown-linux-musl
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.artifact }}

      - name: Run smoke test in ${{ matrix.distro }}
        run: |
          chmod +x ${{ matrix.artifact }}
          docker run --rm \
            -v "$PWD/${{ matrix.artifact }}:/usr/local/bin/clickhousectl:ro" \
            ${{ matrix.distro }} \
            sh -c 'clickhousectl --version && clickhousectl --help'

  release:
    name: Create Release
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir release
          for dir in artifacts/clickhousectl-*/; do
            cp "$dir"/* release/
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --generate-notes release/*
