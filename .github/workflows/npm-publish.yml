name: npm publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.18)"
        required: true
        type: string
      dry_run:
        description: "Dry-run (no actual publish)"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Required reviewers on this environment gate every publish behind a human
    # approval click. Relax once trust is established.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write  # for npm provenance
    env:
      # Map our four npm triples to the release asset filename for each one.
      # Verified against v0.1.18 — bare binaries (no tar extraction needed).
      ASSET_darwin_arm64: clickhousectl-aarch64-apple-darwin
      ASSET_darwin_x64: clickhousectl-x86_64-apple-darwin
      ASSET_linux_arm64: clickhousectl-aarch64-unknown-linux-musl
      ASSET_linux_x64: clickhousectl-x86_64-unknown-linux-musl

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve tag and version
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
            dry_run="false"
          else
            tag="$INPUT_TAG"
            dry_run="$INPUT_DRY_RUN"
          fi
          case "$tag" in
            v*) ;;
            *) echo "::error::tag '$tag' must start with 'v'"; exit 1 ;;
          esac
          version="${tag#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "::error::version '$version' is not valid semver"
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "dry_run=$dry_run"
          } >> "$GITHUB_OUTPUT"
          echo "Tag: $tag  Version: $version  Dry-run: $dry_run"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p downloads bin-dir
          for triple in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            env_name="ASSET_$(printf '%s' "$triple" | tr '-' '_')"
            asset="${!env_name}"
            echo "Downloading $asset for $triple"
            gh release download "$TAG" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "$asset" \
              --dir "downloads/$triple" \
              --clobber
            # Robust to tarballs that put the binary in a subfolder vs the root.
            if [ -f "downloads/$triple/$asset" ] && file "downloads/$triple/$asset" | grep -qi 'executable\|Mach-O'; then
              mkdir -p "bin-dir/$triple"
              cp "downloads/$triple/$asset" "bin-dir/$triple/clickhousectl"
            else
              # Assume tarball — extract and find the binary.
              tar -xzf "downloads/$triple/$asset" -C "downloads/$triple"
              bin="$(find "downloads/$triple" -type f -name clickhousectl | head -n 1)"
              if [ -z "$bin" ]; then
                echo "::error::could not locate clickhousectl binary in $asset"
                exit 1
              fi
              mkdir -p "bin-dir/$triple"
              cp "$bin" "bin-dir/$triple/clickhousectl"
            fi
            chmod +x "bin-dir/$triple/clickhousectl"
          done
          ls -lR bin-dir

      - name: Prepare npm packages
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: node scripts/prepare-npm-release.mjs "$VERSION" bin-dir

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          DRY_RUN: ${{ steps.meta.outputs.dry_run }}
        run: |
          set -euo pipefail
          extra=""
          if [ "$DRY_RUN" = "true" ]; then extra="--dry-run"; fi
          for triple in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            echo "::group::publish @clickhouse/clickhousectl-$triple"
            (cd "npm/platforms/$triple" && npm publish --access public $extra)
            echo "::endgroup::"
          done

      - name: Wait for platform packages to be visible
        if: steps.meta.outputs.dry_run != 'true'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          for triple in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            pkg="@clickhouse/clickhousectl-$triple"
            echo "Polling $pkg@$VERSION on registry..."
            for i in $(seq 1 30); do
              if npm view "$pkg@$VERSION" version >/dev/null 2>&1; then
                echo "  visible after ${i} attempt(s)"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "::error::$pkg@$VERSION not visible after 30 attempts"
                exit 1
              fi
              sleep 5
            done
          done

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          DRY_RUN: ${{ steps.meta.outputs.dry_run }}
        run: |
          set -euo pipefail
          extra=""
          if [ "$DRY_RUN" = "true" ]; then extra="--dry-run"; fi
          (cd npm/clickhousectl && npm publish --access public $extra)
